parametros_padrao:
  width: 768
  height: 960
  steps: 25
  cfg: 7
  sampler: "dpmpp_2m"
  scheduler: "karras"
  denoise: 0.75

negative_prompt_padrao: >
  blurry, deformed hands, extra fingers, distorted face, low quality,
  watermark, text, logo, nsfw, cartoon, painting, illustration,
  overexposed, underexposed

tipos_de_imagem:
  capa:
    objetivo: "Amplifica o hook — para o scroll"
    composicao: "Sujeito no terço superior, espaço para texto abaixo"
    expressao: "Tensão ou curiosidade intensa"
    luz: "Contrastada, dramática"

  dark:
    objetivo: "Ambiente do problema — cria urgência"
    composicao: "Ambiente > sujeito, paleta escura com ponto focal"
    expressao: "Pressão, sobrecarga, consequência"
    luz: "Low key, sombras dominantes"

  cta:
    objetivo: "Resolução e confiança — convida à ação"
    composicao: "Sujeito centralizado, background limpo"
    expressao: "Determinação, alívio, solução encontrada"
    luz: "Quente, positiva, clean"

skills_obrigatorias:
  - "Engenharia de prompts para Stable Diffusion"
  - "Composição visual para formato 4:5"
  - "Avaliação de qualidade (rosto, mãos, texto sobreposto)"
  - "Parâmetros ComfyUI (sampler, CFG, steps, LoRA)"
  - "Brief criativo → prompt técnico"

skills_desejaveis:
  - "LoRA selection por nicho"
  - "Inpainting para correção pontual"
  - "ControlNet para composição precisa"
  - "Análise de histograma para contraste de texto"

kpis:
  - nome: "Taxa de aprovação na 1ª geração"
    target: "mínimo 70%"
    frequencia: "por carrossel"
  - nome: "Imagens sem deformação"
    target: "100% (regenera se necessário)"
    frequencia: "por imagem"
  - nome: "Tempo de geração por set de 3"
    target: "< 5 minutos"
    frequencia: "por carrossel"

fluxo_operacional:
  1: "Recebe brief de Maya (copy + emoção + nicho + avatar)"
  2: "Define composição para cada tipo (capa/dark/cta)"
  3: "Escreve prompt técnico + parâmetros"
  4: "Executa via gerar-imagens.js"
  5: "Avalia resultado (rosto, mãos, composição, contraste)"
  6: "Se aprovado: passa caminhos para gerar.js"
  7: "Se reprovado: ajusta prompt e regenera (máx 3 tentativas)"
  8: "Ponto de validação humana antes da montagem final"

checkpoint_humano:
